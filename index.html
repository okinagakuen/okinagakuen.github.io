<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>翁名学園</title>

  <!-- ファビコン / iOS アイコン -->
  <link rel="icon" href="/file/icon_color.png" type="image/png">
  <link rel="apple-touch-icon" href="/file/icon_color.png">

  <!-- CSS 読み込み -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="header-left">
        <img src="/file/icon.png" alt="翁名学園アイコン" class="school-icon">
        <span class="school-name">学校法人 翁名学園</span>
      </div>
      <nav class="header-right">
        <a href="parents" class="nav-link">保護者の皆様</a>
        <a href="access" class="nav-link">アクセス</a>
        <a href="contact" class="nav-link">お問い合わせ</a>
      </nav>
    </div>
    <div class="purple-line thin"></div>
  </header>

  <section class="heading-image">
    <img src="/file/heading.jpg" alt="翁名学園の風景">
  </section>

  <div class="purple-line thick"></div>

  <main class="site-content">
    <div class="school-links">
      <a href="kinder">
        <img src="/file/kinder.PNG" alt="幼稚園" class="school-thumb">
      </a>
      <a href="primary">
        <img src="/file/primary.PNG" alt="小学校" class="school-thumb">
      </a>
      <a href="junior">
        <img src="/file/junior.PNG" alt="中学校" class="school-thumb">
      </a>
      <a href="senior">
        <img src="/file/senior.png" alt="高等学校" class="school-thumb">
      </a>
    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      © 翁名学園
    </div>
  </footer>
</body>
</html>
